services:
  nginx:
    image: nginx:1.27-alpine
    entrypoint: "/docker-entrypoint.sh"
    command: ["nginx", "-g", "daemon off;"]
    ports:
      - "80:80"

    volumes:
      - "./public:/var/www/project/public"
      - "./vhost.conf:/etc/nginx/conf.d/default.conf"

  php:
    image: spaulg/php-dev-containers:8.4
    command: /usr/sbin/php-fpm8.4 -FO

    volumes:
      - "./:/var/www/project"
      - "./pool.conf:/etc/php/8.4/fpm/pool.d/www.conf"
