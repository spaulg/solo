version: "2"
linters:
  enable:
    - staticcheck
    - govet
    - errcheck
    - revive
    - gosec
    - gocyclo
    - unused
    - misspell
    - gochecknoglobals
    - gochecknoinits

  settings:
    gocyclo:
      min-complexity: 25
    gosec:
      excludes:
        - G501

    revive:
      rules:
        - name: var-naming
          disabled: true

        - name: exported
          disabled: true

  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - examples$

formatters:
  enable:
    - goimports

  settings:
    goimports:
      local-prefixes:
       - github.com/spaulg/solo

  exclusions:
    generated: lax
    paths:
      - examples$
