services:
  test:
    build: .
    command: ['/usr/sbin/nginx', '-g', 'daemon off;']
    #    command: nginx -g 'daemon off;'
    ports:
      - "80:80"
    volumes:
      - "./cmd/solo-entrypoint:/solo/cmd/solo-entrypoint"
      - "./internal:/solo/internal"
      - "./go.mod:/solo/go.mod"
      - "./go.sum:/solo/go.sum"

    x-solo:
      workflows:
        build:
          - name: 'List files in root'
            command: '/bin/ls'
            working_directory: '/'

          - name: 'List running processes'
            command: '/bin/ps aux'
            working_directory: '/'

        pre_start:
        post_start:

        pre_stop:
        post_stop:

        pre_destroy:
        post_destroy:
