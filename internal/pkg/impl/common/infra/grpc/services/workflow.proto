syntax = "proto3";
package services;

option go_package = "github.com/spaulg/solo/internal/pkg/impl/common/grpc/services";

message RunWorkflowStreamRequest {
  oneof request {
      WorkflowRunRequest run_request = 1;
      WorkflowStreamRequest stream_request = 2;
  }
}

message WorkflowRunRequest {
  string workflow_name = 1;
}

message WorkflowStreamResponse {
  WorkflowAction action = 1;
  optional WorkflowRunCommand run_command = 2;
}

message WorkflowStreamRequest {
  WorkflowResult result = 1;
  optional WorkflowRunResult run_command_result = 2;
}

enum WorkflowAction {
  UNKNOWN_WORKFLOW_ACTION = 0;
  COMPLETE_ACTION = 1;
  RUN_COMMAND_ACTION = 2;
}

message WorkflowRunCommand {
  string command = 2;
  repeated string arguments = 3;
  string working_directory = 4;
}

enum WorkflowResult {
  UNKNOWN_WORKFLOW_RESULT = 0;
  RUN_COMMAND_RESULT = 1;
}

message WorkflowRunResult {
  string stdout = 2;
  string stderr = 3;
  optional uint32 exit_code = 4;
}

service Workflow {
  rpc RunWorkflowStream(stream RunWorkflowStreamRequest) returns (stream WorkflowStreamResponse);
}
